<style>

777;font-size:18px}.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px 8px;margin:14px 0}.cat{display:flex;flex-direction:column;align-items:center;gap:5px;color:#666;font-size:12px}.cat span:first-child{width:44px;height:44px;border-radius:17px;background:#f4eee7;display:grid;place-items:center;font-size:22px;border:1px solid transparent}.cat.on{color:var(--primary);font-weight:800}.cat.on span:first-child{background:var(--soft);border-color:#ffd0a2;transform:scale(1.05)}.amount-box{background:#fff;border:1px solid var(--line);border-radius:22px;padding:12px 16px;margin:8px 0 12px;min-height:78px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color .18s,box-shadow .18s,transform .18s}.amount-box.focused{border-color:var(--primary);box-shadow:0 0 0 3px var(--bar-glow)}.amount-box.warn{animation:amountWarn .34s ease}.amount-display{text-align:right;font-size:36px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;overflow:hidden;flex:1;white-space:nowrap}.amount-cursor{display:inline-block;width:2px;height:.95em;margin-left:4px;background:var(--primary);vertical-align:-.1em;border-radius:2px;animation:amountBlink 1s steps(2,start) infinite}@keyframes amountBlink{50%{opacity:0}}@keyframes amountWarn{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}55%{transform:translateX(5px)}80%{transform:translateX(-2px)}}.note-input{width:100%;border:0;background:#f7efe8;border-radius:16px;padding:12px 14px;outline:none;color:#333}.note-input.locked{cursor:not-allowed;color:var(--muted)}.keypad{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:12px}.keypad button{height:50px;border-radius:17px;background:#fff;border:1px solid var(--line);box-shadow:0 3px 9px rgba(116,67,16,.04);font-size:20px;font-weight:800}.keypad .date-key{font-size:13px;color:var(--primary);background:var(--soft);display:flex;align-items:center;justify-content:center;gap:2px}.keypad .save-key{grid-column:4;gr pointer-events:none;will-change:top,left,transform}.cat-manage-row.drop-flash{animation:catDropFlash .46s ease}.cat-drag-placeholder{height:60px;border:1px dashed var(--primary);border-radius:14px;background:var(--soft);box-shadow:inset 3px 0 0 var(--primary);margin:2px 0;transition:height .12s ease,background .12s ease}.drag-handle{width:28px;height:38px;border-radius:12px;display:grid;place-items:center;color:var(--muted);font-size:18px;font-weight:900;touch-action:none;cursor:grab;transition:background .16s,color .16s,transform .16s}.drag-handle:active{cursor:grabbing;background:var(--soft);color:var(--primary);transform:scale(1.08)}body.cat-dragging{user-select:none;overflow:hidden;touch-action:none}.cat-section-tip{font-size:12px;color:var(--muted);padding:10px 8px 6px}.small{font-size:12px;padding:7px 10px;border-radius:10px;background:#f5eee7;color:#555}@keyframes catDropFlash{0%{box-shadow:0 0 0 4px var(--bar-glow);background:var(--soft)}100%{box-shadow:none}}.text-box{width:100%;min-height:180px;border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff;outline:none;font-family:ui-monospace,Menlo,monospace;font-size:12px}.splash{position:fixed;inset:0;background:linear-gradient(135deg,#ff7a00,#ffa645);display:grid;place-items:center;z-index:300;color:#fff;transition:.35s}.splash.hide{opacity:0;pointer-events:none}.splash-logo{text-align:center}.splash-logo .mark{width:72px;height:72px;border-radius:24px;background:rgba(255,255,255,.22);display:grid;place-items:center;margin:0 auto 14px;font-size:38px}.splash-logo b{font-size:28px}.splash-logo p{margin:8px 0 0;opacity:.84}.file-hidden{display:none}.native-date{position:absolute;opacity:0;pointer-events:none}.switch{width:48px;height:28px;border-radius:999px;background:#ddd;position:relative;transition:.2s}.switch:after{content:"";position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;left:2px;top:2px;transition:.2s;box-shadow:0 2px 6px rgba(0,0,0,.16)}.switch.on{background:var(--primary)}.switch.on:after{left:22px}.cal-blank{width:18px;height:18px;border:2px solid currentColor;border-radius:5px;display:inline-block;position:relative;vertical-align:-4px;margin-right:4px}.cal-blank:before{content:"";position:absolute;left:3px;right:3px;top:4px;border-top:2px solid currentColor}.cal-blank:after{content:"";position:absolute;width:3px;height:3px;border-radius:50%;background:currentColor;left:4px;top:-4px;box-shadow:7px 0 0 currentColor}.year-wheel{height:220px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:18px;padding:8px;scroll-snap-type:y mandatory}.year-item,.time-item{height:44px;display:flex;align-items:center;justify-content:center;border-radius:14px;font-weight:800;color:#777;scroll-snap-align:center}.year-item.on,.time-item.on{background:var(--soft);color:var(--primary);font-size:18px}.time-picker{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.time-wheel{height:220px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:18px;padding:8px;scroll-snap-type:y mandatory}.time-labels{display:grid;grid-template-columns:1fr 1fr;gap:10px;color:#999;font-size:12px;text-align:center;margin-top:10px}@media(max-width:360px){.page{padding-left:12px;padding-right:12px}.summary .big{font-size:30px}.amount-display{font-size:34px}.bill-table td{font-size:12px}.bill-table th{font-size:10px}.keypad button{height:48px}}

/* v5.8 polish */
.logo-title{display:flex;align-items:center;gap:7px}
.logo-mark{width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;display:inline-grid;place-items:center;font-size:15px;box-shadow:0 5px 12px rgba(255,122,0,.25)}
.home-summary .big{font-size:33px;margin-bottom:12px}
#monthPanel,#yearPanel{align-items:flex-start;padding:72px 10px 0}
#monthPanel .panel-box,#yearPanel .panel-box{border-radius:24px;max-height:76vh;padding:14px;box-shadow:0 12px 34px rgba(75,46,20,.16)}
#yearPanel .panel-box{max-width:330px;margin:0 auto}
.month-grid{grid-template-columns:repeat(4,1fr);gap:8px}
.month-cell{border-radius:14px;padding:10px 4px}
.month-cell b{font-size:13px}
.month-cell small{font-size:10px;margin-top:3px}
.chart-range{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.chart-range button{width:36px;height:36px;border-radius:14px;background:#fff;border:1px solid var(--line);font-size:20px;font-weight:900;color:#666}
.chart-range b{font-size:15px}
.chart-tools{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.chart-tools .seg button{padding:6px 10px;font-size:12px}

.bars.clean .bar-label{display:none}
.line-chart{height:190px;position:relative;border-bottom:1px solid #eee;padding:6px 4px 20px}
.line-chart svg{width:100%;height:150px;display:block;overflow:visible}
.line-chart text{font-size:10px;fill:#999}
.line-point{cursor:pointer}
.pie-wrap{display:grid;grid-template-columns:130px 1fr;gap:12px;align-items:center;min-height:170px}
.pie{width:130px;height:130px;border-radius:50%;background:conic-gradient(var(--primary) 0 60%,#ffd1a6 60% 82%,#ffe6cf 82% 100%);position:relative}
.pie:after{content:"";position:absolute;inset:34px;background:#fff;border-radius:50%}
.pie-list{font-size:13px}
.pie-item{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f4eee7;padding:7px 0}
.pie-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);display:inline-block;margin-right:6px}
#reminderPanel .panel-box{max-height:72vh}
.time-display{text-align:center;font-size:28px;font-weight:900;color:var(--primary);font-variant-numeric:tabular-nums;margin:8px 0 4px}
.time-picker{gap:8px;margin:8px 0 12px}
.time-wheel{height:150px;border-radius:16px;padding:6px}
.time-item{height:34px;border-radius:12px}
.year-wheel{height:190px;border-radius:16px}
.year-item{height:36px;border-radius:12px}
.setting{padding:12px 0}
.setting-left .icon{width:32px;height:32px;border-radius:12px;font-size:16px}
.bill-table th{font-size:10px}
.bill-table td{font-size:12px;padding:12px 0}

.bill-table-compact th,.bill-table-compact td{width:25%}.bill-table-compact td:first-child small{display:block;margin-top:3px;color:#aaa;font-size:10px;font-weight:500}.time-picker{position:relative;align-items:center}.time-picker:before{content:"";position:absolute;left:0;right:0;top:50%;height:38px;transform:translateY(-50%);border-top:1px solid #ffd9b7;border-bottom:1px solid #ffd9b7;background:rgba(255,122,0,.045);border-radius:13px;pointer-events:none;z-index:1}.time-picker:after{content:":";position:absolute;left:50%;top:50%;transform:translate(-50%,-53%);font-size:24px;font-weight:900;color:var(--primary);z-index:2;pointer-events:none}.time-wheel{scroll-snap-type:y mandatory;scroll-behavior:smooth;overscroll-behavior:contain;padding:58px 6px!important;position:relative;z-index:2;background:transparent!important}.time-item{scroll-snap-align:center;background:transparent!important;border-radius:10px;transition:.15s;color:#aaa}.time-item.on{background:transparent!important;color:var(--primary)!important;font-size:20px!important;transform:scale(1.06)}.time-item.near{color:#777}.time-labels{display:grid;grid-template-columns:1fr 1fr;text-align:center;color:#aaa;font-size:12px;margin-top:2px}
/* v6.0 interaction polish */
.action-sheet{z-index:110}
.action-box{width:100%;padding:10px 12px calc(12px + env(safe-area-inset-bottom));}
.action-summary{background:#fff;border-radius:20px 20px 10px 10px;padding:15px 16px;text-align:center;border:1px solid rgba(255,122,0,.08);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.action-summary b{display:block;font-size:16px;margin-bottom:4px}
.action-summary span{font-size:12px;color:#888}
.action-item{width:100%;height:50px;background:#fff;font-weight:850;font-size:16px;border-top:1px solid #f4eee7}
.action-item.danger{color:var(--danger)}
.action-item:first-of-type{margin-top:8px;border-radius:16px 16px 0 0;border-top:0}
.action-item:nth-of-type(2){border-radius:0 0 16px 16px}

.note-suggestions{display:flex;gap:7px;overflow-x:auto;padding:8px 2px 0;margin-bottom:2px;scrollbar-width:none}
.note-suggestions::-webkit-scrollbar{display:none}
.note-chip{flex:0 0 auto;padding:7px 11px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#666;font-size:12px;font-weight:750;box-shadow:0 3px 9px rgba(116,67,16,.04)}
.note-chip:active{transform:scale(.97);background:var(--soft);color:var(--primary)}

.year-picker-frame{position:relative;background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;height:190px}
.year-picker-frame:before,.year-picker-frame:after{content:"";position:absolute;left:0;right:0;height:58px;z-index:3;pointer-events:none}
.year-picker-frame:before{top:0;background:linear-gradient(#fff,rgba(255,255,255,.72))}
.year-picker-frame:after{bottom:0;background:linear-gradient(rgba(255,255,255,.72),#fff)}
.year-select-overlay{position:absolute;left:14px;right:14px;top:50%;height:40px;transform:translateY(-50%);border-radius:14px;background:rgba(255,122,0,.08);border:1px solid #ffd7b3;z-index:1;pointer-events:none}
.year-wheel{height:100%!important;border:0!important;background:transparent!important;padding:75px 8px!important;position:relative;z-index:2;scroll-behavior:smooth;overscroll-behavior:contain;scroll-snap-type:y mandatory}
.year-item{background:transparent!important;transition:.15s;color:#999;scroll-snap-align:center;font-weight:800}
.year-item.on{background:transparent!important;color:var(--primary)!important;font-size:20px!important;transform:scale(1.08)}
.year-item.near{color:#666}
.reminder-off .time-display,.reminder-off .time-labels,.reminder-off .time-picker{opacity:.42;filter:grayscale(.25)}

.bars.clean{padding-top:34px;background:transparent;overflow:visible}

/* make the money card a real theme hero, not a white card */
.summary,
.card.summary,
.home-summary{
  background:var(--hero-gradient)!important;
  color:#fff!important;
  border:0!important;
  box-shadow:0 16px 34px var(--primary-shadow), var(--shadow)!important;
}
.card.summary .label,
.home-summary .label{color:rgba(255,255,255,.88)!important}
.card.summary .big,
.home-summary .big,
.card.summary b,
.home-summary b{color:#fff!important}
.summary:before{background:var(--decor2)!important}
.summary:after{background:var(--decor)!important}

/* stronger themed logo */
.logo-mark{
  background:var(--hero-gradient)!important;
  color:#fff!important;
  box-shadow:0 0 0 4px var(--logo-ring),0 8px 18px var(--primary-shadow)!important;
}

/* the center plus button shadow follows the active skin */
.nav .plus{
  background:var(--hero-gradient)!important;
  box-shadow:0 12px 26px var(--primary-shadow),0 4px 12px rgba(0,0,0,.08)!important;
}

/* cards get a themed tint and more layered atmosphere */
.card:not(.summary),
.month-cell,
.action-summary,
.action-item,
.amount-box,
.field input,
.field textarea,
.field select,
.keypad button,
.text-box{
  background:linear-gradient(180deg,var(--card-tint-2),var(--card-tint))!important;
  border-color:var(--card-border)!important;
  box-shadow:0 10px 26px rgba(0,0,0,.035),var(--shadow)!important;
}
#home .card:not(.summary),
#bill .card:not(.summary),
#chart .card:not(.summary),
#mine .card:not(.summary){position:relative;overflow:hidden}
#home .card:not(.summary)::before,
#bill .card:not(.summary)::before,
#chart .card:not(.summary)::before,
#mine .card:not(.summary)::before{
  content:"";position:absolute;right:-34px;top:-42px;width:112px;height:112px;border-radius:50%;
  background:radial-gradient(circle,var(--surface-glow),transparent 68%);pointer-events:none;
}
#home .card:not(.summary)>*,#bill .card:not(.summary)>*,#chart .card:not(.summary)>*,#mine .card:not(.summary)>*{position:relative;z-index:1}

/* themed icon bubbles and dividers */
.icon,.cat span:first-child,.setting-left .icon,.avatar{
  background:linear-gradient(145deg,var(--icon-bg),var(--card-tint-2))!important;
  border:1px solid var(--card-border)!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 5px 12px rgba(0,0,0,.035)!important;
}
.row,.setting,.rank-row,.pie-item,.bill-table td,.bill-table th{border-color:var(--card-border)!important}
.row{background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent)}

/* pills / switches / selected states feel themed too */
.pill,.seg,.note-input,.year-picker-frame,.time-wheel{
  background:linear-gradient(180deg,var(--card-tint-2),var(--card-tint))!important;
  border-color:var(--card-border)!important;
  box-shadow:0 8px 18px rgba(0,0,0,.035)!important;
}
.seg button.on,.btn.primary,.switch.on,.keypad .save-key{background:var(--hero-gradient)!important;box-shadow:0 8px 18px var(--primary-shadow)!important}
.year-select-overlay,.time-highlight,.month-cell.on,.cat.on span:first-child{background:var(--soft)!important;border-color:var(--primary)!important}

/* theme-specific hero decoration differences */

function refreshFloatingStatus(){if(currentPage==='mine')renderMine()}
function openAddFromFloating(){try{document.querySelectorAll('.panel.show,.sheet.show').forEach(x=>x.classList.remove('show'));go('home');setTimeout(()=>openAdd(false),120)}catch(e){try{openAdd(false)}catch(_){}}}
function openReminder(){let parts=(reminder.time||'21:00').split(':');reminderHour=parts[0]||'21';reminderMinute=parts[1]||'00';$('reminderSwitch').classList.toggle('on',!!reminder.enabled);renderTimeWheels();$('reminderPanel').classList.add('show');updateReminderPanelState();setTimeout(()=>{centerWheelValue('hourWheel',reminderHour);centerWheelValue('minuteWheel',reminderMinute);attachReminderWheel('hourWheel','hour');attachReminderWheel('minuteWheel','minute');updateReminderWheelState('hourWheel','hour');updateReminderWheelState('minuteWheel','minute')},80)}function renderTimeWheels(){if($('reminderTimeDisplay'))$('reminderTimeDisplay').textContent=reminderHour+':'+reminderMinute;let hs='',ms='';for(let h=0;h<24;h++){let v=String(h).padStart(2,'0');hs+=`<button class="time-item ${v===reminderHour?'on':''}" data-value="${v}" onclick="setReminderHour('${v}')">${v}</button>`}for(let m=0;m<60;m++){let v=String(m).padStart(2,'0');ms+=`<button class="time-item ${v===reminderMinute?'on':''}" data-value="${v}" onclick="setReminderMinute('${v}')">${v}</button>`}$('hourWheel').innerHTML=hs;$('minuteWheel').innerHTML=ms}function centerWheelValue(id,value){let wheel=$(id);let el=wheel&&wheel.querySelector(`.time-item[data-value="${value}"]`);if(!wheel||!el)return;wheel.scrollTop=el.offsetTop-(wheel.clientHeight-el.offsetHeight)/2}function nearestWheelItem(wheel){let center=wheel.scrollTop+wheel.clientHeight/2;let items=[...wheel.querySelectorAll('.time-item')];let best=items[0],dist=Infinity;items.forEach(it=>{let c=it.offsetTop+it.offsetHeight/2,d=Math.abs(c-center);if(d<dist){dist=d;best=it}});return best}function updateReminderWheelState(id,type,doSnap=false){let wheel=$(id);if(!wheel)return;let item=nearestWheelItem(wheel);if(!item)return;let val=item.dataset.value;if(type==='hour')reminderHour=val;else reminderMinute=val;if($('reminderTimeDisplay'))$('reminderTimeDisplay').textContent=reminderHour+':'+reminderMinute;[...wheel.querySelectorAll('.time-item')].forEach(it=>{it.classList.toggle('on',it===item);let diff=Math.abs((it.offsetTop+it.offsetHeight/2)-(wheel.scrollTop+wheel.clientHeight/2));it.classList.toggle('near',diff<70&&it!==item)});if(doSnap){wheel.scrollTo({top:item.offsetTop-(wheel.clientHeight-item.offsetHeight)/2,behavior:'smooth'})}}function attachReminderWheel(id,type){let wheel=$(id);if(!wheel||wheel.dataset.snapReady)return;wheel.dataset.snapReady='1';let timer=null;wheel.addEventListener('scroll',()=>{updateReminderWheelState(id,type,false);clearTimeout(timer);timer=setTimeout(()=>updateReminderWheelState(id,type,true),120)},{passive:true})}function setReminderHour(v){reminderHour=v;if($('reminderTimeDisplay'))$('reminderTimeDisplay').textContent=reminderHour+':'+reminderMinute;centerWheelValue('hourWheel',v);setTimeout(()=>updateReminderWheelState('hourWheel','hour',true),80)}function setReminderMinute(v){reminderMinute=v;if($('reminderTimeDisplay'))$('reminderTimeDisplay').textContent=reminderHour+':'+reminderMinute;centerWheelValue('minuteWheel',v);setTimeout(()=>updateReminderWheelState('minuteWheel','minute',true),80)}function updateReminderPanelState(){let box=$('reminderPanel')&&$('reminderPanel').querySelector('.panel-box');if(box)box.classList.toggle('reminder-off',!$('reminderSwitch').classList.contains('on'))}function toggleReminderSwitch(){$('reminderSwitch').classList.toggle('on');updateReminderPanelState()}function saveReminder(){reminder={enabled:$('reminderSwitch').classList.contains('on'),time:reminderHour+':'+reminderMinute};saveAll();scheduleReminder();closePanel('reminderPanel');renderMine();toast(reminder.enabled?'提醒已开启':'提醒已关闭')}function scheduleReminder(){try{if(window.AndroidBridge){if(reminder.enabled&&AndroidBridge.scheduleDailyReminder)AndroidBridge.scheduleDailyReminder(reminder.time);if(!reminder.enabled&&AndroidBridge.cancelDailyReminder)AndroidBridge.cancelDailyReminder()}}catch(e){}}function openAbout(){$('aboutPanel').classList.add('show')}async function feedback(){let v=await appPrompt('意见反馈','',{multiline:true,placeholder:'写下你的建议或遇到的问题…'});if(v&&v.trim()){let arr=readJSON('mjz_feedback',[]);arr.push({time:new Date().toISOString(),text:v.trim()});localStorage.mjz_feedback=JSON.stringify(arr);if(window.AndroidBridge&&AndroidBridge.saveFeedback)AndroidBridge.saveFeedback(v.trim());toast('感谢反馈，已保存')}}
function makeBackup(){return JSON.stringify({version:'5.9',exportedAt:new Date().toISOString(),entries,cats,incomeCats,budget,nick,avatar,reminder,theme:currentTheme},null,2)}function backup(){$('textTitle').textContent='备份数据';$('textBox').value=makeBackup();$('backupActions').style.display='flex';$('restoreActions').style.display='none';$('exportPath').style.display='none';$('textPanel').classList.add('show')}function restorePrompt(){$('textTitle').textContent='恢复数据';$('textBox').value='';$('backupActions').style.display='none';$('restoreActions').style.display='flex';$('exportPath').style.display='none';$('textPanel').classList.add('show')}function copyText(){let v=$('textBox').value;navigator.clipboard&&navigator.clipboard.writeText(v);$('textBox').select();document.execCommand('copy');toast('已复制')}function exportFileDirect(){let data=makeBackup();let name='秒记账备份_'+todayStr()+'.json';if(window.AndroidBridge&&AndroidBridge.exportBackupFile){let p=AndroidBridge.exportBackupFile(name,data);toast(p?'已导出到下载目录':'导出失败');return}downloadText(name,data)}function exportFile(){let data=$('textBox').value||makeBackup();let name='秒记账备份_'+todayStr()+'.json';if(window.AndroidBridge&&AndroidBridge.exportBackupFile){let p=AndroidBridge.exportBackupFile(name,data);$('exportPath').textContent=p?'已导出：'+p:'导出失败';$('exportPath').style.display='block';toast(p?'已导出':'导出失败');return}downloadText(name,data)}function downloadText(name,data){let blob=new Blob([data],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}function chooseRestoreFile(){$('restoreFile').value='';$('restoreFile').click()}function backupEntryCount(o){return o&&Array.isArray(o.entries)?o.entries.length:0}function showRestoreInfo(fileName,count){let local=entries.length,msg=`已读取${fileName?'：'+fileName:''}，备份 ${count} 条，当前本地 ${local} 条。请选择合并恢复或替换恢复。`;$('exportPath').textContent=msg;$('exportPath').style.display='block';toast(`已读取备份 ${count} 条，本地 ${local} 条`)}function handleRestoreFile(ev){let f=ev.target.files&&ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let txt=String(r.result||'');$('textBox').value=txt;try{let o=JSON.parse(txt);if(!Array.isArray(o.entries)){toast('未找到账单数据，请确认备份文件包含 entries 字段');return}showRestoreInfo(f.name,backupEntryCount(o))}catch(e){toast('文件不是有效备份，请确认选择的是秒记账导出的 JSON 文件')}};r.readAsText(f,'utf-8')}function normEntry(e){return{amount:Number(e.amount)||0,date:e.date||'',time:e.time||'',name:e.name||'其他',icon:e.icon||'…',note:e.note||''}}function ekey(e){let x=normEntry(e);return [x.date,x.time,x.amount,x.name,x.icon,x.note].join('|')}async function restoreBackup(mode){let txt=$('textBox').value.trim();if(!txt){toast('请先粘贴或导入备份文件');return}try{let o=JSON.parse(txt);if(!Array.isArray(o.entries)){toast('未找到账单数据，请确认备份文件包含 entries 字段');return}let fileCount=o.entries.length,beforeCount=entries.length;if(mode==='replace'){let ok=await appConfirm('确认替换恢复',`替换恢复会清空当前本地数据。\n\n当前本地：${beforeCount} 条\n备份账单：${fileCount} 条\n\n确认继续？`,{danger:true,okText:'继续'});if(!ok)return}if(mode==='merge'){let set=new Set(entries.map(ekey)),added=0,skip=0;o.entries.map(normEntry).forEach(e=>{let k=ekey(e);if(set.has(k))skip++;else{entries.unshift(e);set.add(k);added++}});mergeCatList(cats,o.cats);mergeCatList(incomeCats,o.incomeCats);let afterCount=entries.length;toast(`合并完成：原有 ${beforeCount} 条，新增 ${added} 条，跳过 ${skip} 条，当前共 ${afterCount} 条`)}else{entries=o.entries.map(normEntry);if(Array.isArray(o.cats)&&o.cats.length)cats=o.cats;if(Array.isArray(o.incomeCats)&&o.incomeCats.length)incomeCats=o.incomeCats;budget=isNaN(parseFloat(o.budget))?budget:parseFloat(o.budget);nick=o.nick||nick;avatar=o.avatar||avatar;reminder=o.reminder||reminder;if(o.theme)applyTheme(o.theme);toast(`替换完成：已恢复 ${entries.length} 条账单`)}saveAll();closePanel('textPanel');render()}catch(e){toast('文件不是有效备份，请确认选择的是秒记账导出的 JSON 文件')}}function mergeCatList(target,src){if(!Array.isArray(src))return;let s=new Set(target.map(c=>c[0]+'|'+c[1]));src.forEach(c=>{if(Array.isArray(c)&&c.length>=2&&!s.has(c[0]+'|'+c[1])){target.push([c[0],c[1]]);s.add(c[0]+'|'+c[1])}})}async function clearData(){let ok=await appConfirm('确认清空',`清空后无法恢复。\n\n当前账单：${entries.length} 条\n确认清空所有账单记录？`,{danger:true,okText:'清空'});if(ok){entries=[];saveAll();render();toast('已清空')}}
render();


</script>
